name: ⚠️ Delete cognito

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-cognito:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Look up resources before stack deletion
        id: lookup
        run: |
          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-cognito \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" \
            --output text 2>/dev/null || echo "")
          echo "user_pool_id=$USER_POOL_ID" >> $GITHUB_OUTPUT

          CF_DOMAIN=$(aws cognito-idp describe-user-pool-domain \
            --domain ${{ vars.AUTH_DOMAIN_NAME }} \
            --query 'DomainDescription.CloudFrontDistribution' \
            --output text 2>/dev/null || echo "")
          echo "cf_domain=$CF_DOMAIN" >> $GITHUB_OUTPUT

      - name: Remove Route 53 alias for Cognito custom domain
        run: |
          CF_DOMAIN="${{ steps.lookup.outputs.cf_domain }}"
          if [ -z "$CF_DOMAIN" ] || [ "$CF_DOMAIN" = "None" ]; then
            echo "No active Cognito domain found, skipping Route 53 cleanup"
            exit 0
          fi

          echo "Removing Route 53 alias: ${{ vars.AUTH_DOMAIN_NAME }} -> $CF_DOMAIN"
          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ secrets.HOSTED_ZONE_ID }} \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"DELETE\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${{ vars.AUTH_DOMAIN_NAME }}\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                    \"DNSName\": \"$CF_DOMAIN\",
                    \"EvaluateTargetHealth\": false
                  }
                }
              }]
            }" || echo "Route 53 record not found or already deleted, continuing"

      - name: Delete cognito stack
        run: |
          aws cloudformation delete-stack \
            --stack-name firefly-cognito
          aws cloudformation wait stack-delete-complete \
            --stack-name firefly-cognito

      - name: Delete retained Cognito User Pool
        run: |
          USER_POOL_ID="${{ steps.lookup.outputs.user_pool_id }}"
          if [ -z "$USER_POOL_ID" ] || [ "$USER_POOL_ID" = "None" ]; then
            echo "No User Pool ID found, skipping"
            exit 0
          fi

          echo "Deleting Cognito User Pool: $USER_POOL_ID"
          aws cognito-idp delete-user-pool --user-pool-id "$USER_POOL_ID"
          echo "User Pool deleted"
