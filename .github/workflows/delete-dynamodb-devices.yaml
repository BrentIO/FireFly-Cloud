name: ⚠️ Delete dynamodb-devices
run-name: "Delete dynamodb-devices from ${{ inputs.target_env }}"

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-dynamodb-devices:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Delete dynamodb-devices
        run: |
          aws cloudformation delete-stack \
            --stack-name firefly-dynamodb-devices
          aws cloudformation wait stack-delete-complete \
            --stack-name firefly-dynamodb-devices
