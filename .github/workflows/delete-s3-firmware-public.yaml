name: ⚠️ Delete S3 Firmware Public

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-firmware-public:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 firmware public bucket
        env:
          TARGET_ENV: ${{ inputs.target_env }}
        run: |
          python3 << 'PYEOF'
          import subprocess, sys, os
          import boto3
          from botocore.exceptions import ClientError

          cf = boto3.client('cloudformation')
          try:
            r = cf.describe_stack_resource(
              StackName='firefly-s3-firmware-public',
              LogicalResourceId='FirmwarePublicBucket')
            bucket = r['StackResourceDetail']['PhysicalResourceId']
          except ClientError as e:
            if e.response['Error']['Code'] in ('ValidationError', 'ResourceNotFoundException'):
              print('Stack firefly-s3-firmware-public not found, skipping')
              sys.exit(0)
            raise

          print(f'Checking bucket contents: {bucket}')
          s3 = boto3.client('s3')
          try:
            resp = s3.list_objects_v2(Bucket=bucket, MaxKeys=1)
          except ClientError as e:
            if e.response['Error']['Code'] == 'NoSuchBucket':
              print(f'Bucket {bucket} does not exist, skipping')
              sys.exit(0)
            raise
          if resp.get('KeyCount', 0) > 0 and os.environ.get('TARGET_ENV') == 'production':
            print(f"ERROR: Production firmware public bucket '{bucket}' is not empty. Refusing to empty.")
            sys.exit(1)

          print(f'Emptying bucket: {bucket}')
          subprocess.run(['aws', 's3', 'rm', f's3://{bucket}', '--recursive'])

          # Abort incomplete multipart uploads
          print('Aborting incomplete multipart uploads...')
          while True:
            resp = s3.list_multipart_uploads(Bucket=bucket, MaxUploads=100)
            uploads = resp.get('Uploads', [])
            if not uploads:
              break
            for u in uploads:
              s3.abort_multipart_upload(Bucket=bucket, Key=u['Key'], UploadId=u['UploadId'])
              print(f'  Aborted: {u["Key"]}')

          print('Bucket emptied successfully')
          PYEOF

      - name: Delete s3-firmware-public
        run: |
          sam delete \
            --stack-name firefly-s3-firmware-public \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts
