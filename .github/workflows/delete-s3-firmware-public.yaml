name: ⚠️ Delete S3 Firmware Public

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-firmware-public:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 firmware public bucket
        run: |
          BUCKET=$(aws cloudformation describe-stack-resource \
            --stack-name firefly-s3-firmware-public \
            --logical-resource-id FirmwarePublicBucket \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text 2>/dev/null || true)
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "Stack firefly-s3-firmware-public not found, skipping"
            exit 0
          fi
          echo "Emptying bucket: $BUCKET"
          aws s3 rm "s3://$BUCKET" --recursive || true

      - name: Delete s3-firmware-public
        run: |
          sam delete \
            --stack-name firefly-s3-firmware-public \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts
