name: ⚠️ Delete S3 Firmware

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-firmware:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 firmware bucket
        run: |
          BUCKET=$(aws cloudformation describe-stack-resource \
            --stack-name firefly-s3-firmware \
            --logical-resource-id S3Bucket \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text 2>/dev/null || true)
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "Stack firefly-s3-firmware not found, skipping"
            exit 0
          fi
          echo "Emptying bucket: $BUCKET"
          BUCKET="$BUCKET" python3 -c "
import boto3, os, sys
from botocore.exceptions import ClientError
name = os.environ['BUCKET']
try:
    deleted = boto3.resource('s3').Bucket(name).object_versions.delete()
    print(f'Deleted {len(deleted) if deleted else 0} version(s)/marker(s) from {name}')
except ClientError as e:
    code = e.response['Error']['Code']
    if code in ('NoSuchBucket', '404'):
        print(f'Bucket {name} does not exist, skipping')
        sys.exit(0)
    raise
"

      - name: Delete s3-firmware
        run: |
          sam delete \
            --stack-name firefly-s3-firmware \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts