name: ⚠️ Delete S3 Firmware

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-firmware:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 firmware bucket
        env:
          TARGET_ENV: ${{ inputs.target_env }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, os, tempfile

          r = subprocess.run(
            ['aws', 'cloudformation', 'describe-stack-resource',
             '--stack-name', 'firefly-s3-firmware',
             '--logical-resource-id', 'S3Bucket',
             '--query', 'StackResourceDetail.PhysicalResourceId',
             '--output', 'text'],
            capture_output=True, text=True)
          bucket = r.stdout.strip()
          if not bucket or bucket == 'None':
            print('Stack firefly-s3-firmware not found, skipping')
            sys.exit(0)

          print(f'Checking bucket contents: {bucket}')
          r2 = subprocess.run(
            ['aws', 's3api', 'list-objects-v2', '--bucket', bucket,
             '--max-items', '1', '--output', 'json'],
            capture_output=True, text=True, check=True)
          key_count = json.loads(r2.stdout).get('KeyCount', 0)
          if key_count > 0 and os.environ.get('TARGET_ENV') == 'production':
            print(f"ERROR: Production firmware bucket '{bucket}' is not empty. Refusing to empty.")
            sys.exit(1)

          print(f'Emptying bucket: {bucket}')
          subprocess.run(['aws', 's3', 'rm', f's3://{bucket}', '--recursive'])

          for field in ('Versions', 'DeleteMarkers'):
            print(f'Deleting {field}...')
            while True:
              r3 = subprocess.run(
                ['aws', 's3api', 'list-object-versions',
                 '--bucket', bucket, '--max-items', '500', '--output', 'json'],
                capture_output=True, text=True, check=True)
              data = json.loads(r3.stdout)
              items = [{'Key': x['Key'], 'VersionId': x['VersionId']}
                       for x in (data.get(field) or []) if x.get('VersionId')]
              if not items:
                break
              with tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False) as f:
                json.dump({'Objects': items}, f)
                fname = f.name
              r4 = subprocess.run(
                ['aws', 's3api', 'delete-objects', '--bucket', bucket,
                 '--delete', f'file://{fname}'],
                text=True)
              os.unlink(fname)
              if r4.returncode != 0:
                sys.exit(r4.returncode)

          print('Bucket emptied successfully')
          PYEOF

      - name: Delete s3-firmware
        run: |
          sam delete \
            --stack-name firefly-s3-firmware \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts