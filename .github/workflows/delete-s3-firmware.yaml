name: ⚠️ Delete S3 Firmware

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-firmware:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 firmware bucket
        run: |
          python3 - <<'EOF'
          import boto3, sys
          from botocore.exceptions import ClientError
          bucket_name = "${{ secrets.S3_FIRMWARE_PRIVATE_BUCKET_NAME }}"
          s3 = boto3.resource("s3")
          bucket = s3.Bucket(bucket_name)
          try:
              deleted = bucket.object_versions.delete()
              count = len(deleted) if deleted else 0
              print(f"Deleted {count} object version(s)/marker(s) from {bucket_name}")
          except ClientError as e:
              code = e.response["Error"]["Code"]
              if code in ("NoSuchBucket", "404"):
                  print(f"Bucket {bucket_name} does not exist, skipping")
                  sys.exit(0)
              raise
          EOF

      - name: Delete s3-firmware
        run: |
          sam delete \
            --stack-name firefly-s3-firmware \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts