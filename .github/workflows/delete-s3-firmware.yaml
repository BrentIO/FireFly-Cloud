name: ⚠️ Delete S3 Firmware

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-firmware:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 firmware bucket
        run: |
          if aws s3api head-bucket --bucket ${{ secrets.S3_FIRMWARE_PRIVATE_BUCKET_NAME }} 2>/dev/null; then
            aws s3 rb s3://${{ secrets.S3_FIRMWARE_PRIVATE_BUCKET_NAME }} --force
          else
            echo "Bucket does not exist, skipping empty step"
          fi

      - name: Delete s3-firmware
        run: |
          sam delete \
            --stack-name firefly-s3-firmware \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts