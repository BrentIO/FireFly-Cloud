name: ⚠️ Delete S3 Firmware

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-firmware:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 firmware bucket
        env:
          TARGET_ENV: ${{ inputs.target_env }}
        run: |
          python3 << 'PYEOF'
          import subprocess, sys, os
          import boto3
          from botocore.exceptions import ClientError

          # Resolve physical bucket name from CloudFormation stack
          cf = boto3.client('cloudformation')
          try:
            r = cf.describe_stack_resource(
              StackName='firefly-s3-firmware',
              LogicalResourceId='S3Bucket')
            bucket = r['StackResourceDetail']['PhysicalResourceId']
          except ClientError as e:
            if e.response['Error']['Code'] in ('ValidationError', 'ResourceNotFoundException'):
              print('Stack firefly-s3-firmware not found, skipping')
              sys.exit(0)
            raise

          print(f'Checking bucket contents: {bucket}')
          s3 = boto3.client('s3')
          resp = s3.list_objects_v2(Bucket=bucket, MaxKeys=1)
          if resp.get('KeyCount', 0) > 0 and os.environ.get('TARGET_ENV') == 'production':
            print(f"ERROR: Production firmware bucket '{bucket}' is not empty. Refusing to empty.")
            sys.exit(1)

          print(f'Emptying bucket: {bucket}')
          subprocess.run(['aws', 's3', 'rm', f's3://{bucket}', '--recursive'])

          for field in ('Versions', 'DeleteMarkers'):
            print(f'Deleting {field}...')
            while True:
              resp = s3.list_object_versions(Bucket=bucket, MaxKeys=500)
              items = [{'Key': x['Key'], 'VersionId': x['VersionId']}
                       for x in resp.get(field, []) if x.get('VersionId')]
              if not items:
                break
              result = s3.delete_objects(Bucket=bucket, Delete={'Objects': items})
              errors = result.get('Errors', [])
              if errors:
                for err in errors:
                  print(f"ERROR: Failed to delete {err['Key']} (VersionId={err.get('VersionId')}): {err['Code']} - {err['Message']}")
                sys.exit(1)

          print('Bucket emptied successfully')
          PYEOF

      - name: Delete s3-firmware
        run: |
          sam delete \
            --stack-name firefly-s3-firmware \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts