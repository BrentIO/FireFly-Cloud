name: ⚠️ Delete S3 Firmware

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-firmware:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 firmware bucket
        run: |
          BUCKET=$(aws cloudformation describe-stack-resource \
            --stack-name firefly-s3-firmware \
            --logical-resource-id S3Bucket \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text 2>/dev/null || true)
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "Stack firefly-s3-firmware not found, skipping"
            exit 0
          fi
          echo "Emptying bucket: $BUCKET"
          aws s3 rm "s3://$BUCKET" --recursive || true
          echo "Deleting versioned objects..."
          while true; do
            BATCH=$(aws s3api list-object-versions --bucket "$BUCKET" \
              --max-items 500 \
              --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
              --output json)
            OBJECTS=$(echo "$BATCH" | jq -r '.Objects')
            if [ "$OBJECTS" = "null" ] || [ "$OBJECTS" = "[]" ]; then break; fi
            echo "$BATCH" > /tmp/batch.json
            aws s3api delete-objects --bucket "$BUCKET" --delete file:///tmp/batch.json
          done
          echo "Deleting delete markers..."
          while true; do
            BATCH=$(aws s3api list-object-versions --bucket "$BUCKET" \
              --max-items 500 \
              --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
              --output json)
            OBJECTS=$(echo "$BATCH" | jq -r '.Objects')
            if [ "$OBJECTS" = "null" ] || [ "$OBJECTS" = "[]" ]; then break; fi
            echo "$BATCH" > /tmp/batch.json
            aws s3api delete-objects --bucket "$BUCKET" --delete file:///tmp/batch.json
          done

      - name: Delete s3-firmware
        run: |
          sam delete \
            --stack-name firefly-s3-firmware \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts