name: ⚠️ Delete S3 UI

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-s3-ui:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Empty S3 UI bucket
        run: |
          BUCKET="${{ secrets.S3_UI_BUCKET_NAME }}"
          STDERR=$(mktemp)
          if ! aws s3 rm "s3://$BUCKET" --recursive 2>"$STDERR"; then
            if grep -qiE "NoSuchBucket|does not exist" "$STDERR"; then
              echo "Bucket does not exist, skipping"
              rm -f "$STDERR"
              exit 0
            fi
            cat "$STDERR" >&2
            rm -f "$STDERR"
            exit 1
          fi
          rm -f "$STDERR"

      - name: Delete s3-ui
        run: |
          sam delete \
            --stack-name firefly-s3-ui \
            --region ${{ secrets.AWS_REGION }} \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }} \
            --no-prompts
