name: ⚠️ Delete UI App

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  delete-ui-app:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Empty S3 UI bucket
        run: |
          BUCKET="${{ secrets.S3_UI_BUCKET_NAME }}"
          STDERR=$(mktemp)
          if ! aws s3 rm "s3://$BUCKET" --recursive 2>"$STDERR"; then
            if grep -qiE "NoSuchBucket|does not exist" "$STDERR"; then
              echo "Bucket does not exist, skipping"
              rm -f "$STDERR"
              exit 0
            fi
            cat "$STDERR" >&2
            rm -f "$STDERR"
            exit 1
          fi
          rm -f "$STDERR"
