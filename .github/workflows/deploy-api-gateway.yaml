name: 🚀 Deploy API Gateway

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
      run_tests:
        type: boolean
        description: "Run integration tests after deploy"
        default: true
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      run_tests:
        required: false
        type: boolean
        default: false

jobs:
  deploy-api-gateway:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Look up Certificate ARN for firefly-acm
        id: lookup-cert
        run: |
          CERT_ARN=$(aws cloudformation describe-stacks \
            --stack-name firefly-acm \
            --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue" \
            --output text)

          echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT

      - name: Look up Cognito User Pool ID and Client ID
        id: lookup-cognito
        run: |
          POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-cognito \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" \
            --output text)
          CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-cognito \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" \
            --output text)
          echo "pool_id=$POOL_ID" >> $GITHUB_OUTPUT
          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Build api-gateway
        run: sam build --template-file templates/api-gateway.yaml

      - name: Deploy api-gateway
        run: |
          sam deploy \
            --role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }} \
            --template-file templates/api-gateway.yaml \
            --stack-name firefly-api-gateway \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --region ${{ secrets.AWS_REGION }} \
            --parameter-overrides \
              ApiDomainName=${{ vars.API_DOMAIN_NAME }} \
              CertificateArn=${{ steps.lookup-cert.outputs.cert_arn }} \
              HostedZoneId=${{ secrets.HOSTED_ZONE_ID }} \
              UiOrigin=https://${{ vars.UI_DOMAIN_NAME }} \
              CognitoUserPoolId=${{ steps.lookup-cognito.outputs.pool_id }} \
              CognitoUserPoolClientId=${{ steps.lookup-cognito.outputs.client_id }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }}

      - name: Configure CORS on API Gateway
        run: |
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-api-gateway \
            --query "Stacks[0].Outputs[?OutputKey=='ApiId'].OutputValue" \
            --output text)

          aws apigatewayv2 update-api \
            --api-id "$API_ID" \
            --cors-configuration '{"AllowOrigins":["https://${{ vars.UI_DOMAIN_NAME }}"],"AllowMethods":["GET","POST","PUT","PATCH","DELETE","OPTIONS"],"AllowHeaders":["Content-Type","Authorization"],"MaxAge":300}'

  run-integration-tests:
    if: inputs.run_tests
    needs: deploy-api-gateway
    uses: ./.github/workflows/run-integration-tests.yaml
    secrets: inherit
    with:
      target_env: ${{ inputs.target_env }}
