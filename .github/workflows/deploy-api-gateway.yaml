name: 🚀 Deploy API Gateway

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
      run_tests:
        type: boolean
        description: "Run integration tests after deploy"
        default: true
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      run_tests:
        required: false
        type: boolean
        default: false

jobs:
  deploy-api-gateway:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Look up ACM Certificate ARN for CERTIFICATE_DOMAIN_NAME
        id: lookup-cert
        run: |
          CERT_DOMAIN="${{ vars.CERTIFICATE_DOMAIN_NAME }}"

          CERT_ARN=$(aws acm list-certificates \
            --certificate-statuses ISSUED \
            --query "CertificateSummaryList[?DomainName=='${CERT_DOMAIN}'].CertificateArn" \
            --output text)

          echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT

      - name: Build api-gateway
        run: sam build --template-file templates/api-gateway.yaml

      - name: Deploy api-gateway
        run: |
          sam deploy \
            --role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }} \
            --template-file templates/api-gateway.yaml \
            --stack-name firefly-api-gateway \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region ${{ secrets.AWS_REGION }} \
            --parameter-overrides \
              ApiDomainName=${{ vars.API_DOMAIN_NAME }} \
              CertificateArn=${{ steps.lookup-cert.outputs.cert_arn }} \
              HostedZoneId=${{ secrets.HOSTED_ZONE_ID }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }}

      - name: Configure CORS on API Gateway
        env:
          UI_DOMAIN: ${{ vars.UI_DOMAIN_NAME }}
        run: |
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-api-gateway \
            --query "Stacks[0].Outputs[?OutputKey=='ApiId'].OutputValue" \
            --output text)

          CORS_JSON=$(python3 -c "import json, os; print(json.dumps({'AllowOrigins': ['https://' + os.environ['UI_DOMAIN']], 'AllowMethods': ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS'], 'AllowHeaders': ['Content-Type', 'Authorization'], 'MaxAge': 300}))")

          aws apigatewayv2 update-api \
            --api-id "$API_ID" \
            --cors-configuration "$CORS_JSON"

          # Toggle auto-deploy off then on to force a new deployment that
          # includes the updated CorsConfiguration. Auto-deploy only fires
          # automatically on route/integration changes, not API-level changes.
          aws apigatewayv2 update-stage \
            --api-id "$API_ID" \
            --stage-name '$default' \
            --no-auto-deploy

          aws apigatewayv2 update-stage \
            --api-id "$API_ID" \
            --stage-name '$default' \
            --auto-deploy

  run-integration-tests:
    if: inputs.run_tests
    needs: deploy-api-gateway
    uses: ./.github/workflows/run-integration-tests.yaml
    secrets: inherit
    with:
      target_env: ${{ inputs.target_env }}
