name: 🚀 Deploy Cognito
on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  deploy-cognito:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Look up Certificate ARN for firefly-acm
        id: lookup-cert
        run: |
          CERT_ARN=$(aws cloudformation describe-stacks \
            --stack-name firefly-acm \
            --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue" \
            --output text)
          echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT

      - name: Look up pre-signup Lambda ARN
        id: lookup-presignup
        run: |
          ARN=$(aws cloudformation describe-stacks \
            --stack-name firefly-func-cognito-pre-signup \
            --query "Stacks[0].Outputs[?OutputKey=='FuncCognitoPreSignupArn'].OutputValue" \
            --output text)
          echo "presignup_arn=$ARN" >> $GITHUB_OUTPUT

      - name: Delete stack if in ROLLBACK_COMPLETE or UPDATE_ROLLBACK_COMPLETE
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name firefly-cognito \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "UPDATE_ROLLBACK_COMPLETE" ]; then
            echo "Stack is in $STATUS — deleting before redeploy"
            aws cloudformation delete-stack --stack-name firefly-cognito
            aws cloudformation wait stack-delete-complete --stack-name firefly-cognito
          fi

      - name: Delete orphaned user pools
        run: |
          python3 << 'PYEOF'
          import boto3
          from botocore.exceptions import ClientError

          cognito = boto3.client("cognito-idp")
          cf = boto3.client("cloudformation")

          # Get the pool ID currently tracked by the stack (if it exists and is healthy)
          current_pool_id = None
          try:
              outputs = cf.describe_stacks(StackName="firefly-cognito")["Stacks"][0].get("Outputs", [])
              for o in outputs:
                  if o["OutputKey"] == "UserPoolId":
                      current_pool_id = o["OutputValue"]
          except ClientError:
              pass

          paginator = cognito.get_paginator("list_user_pools")
          for page in paginator.paginate(MaxResults=60):
              for pool in page["UserPools"]:
                  if pool["Name"] != "firefly-user-pool":
                      continue
                  pool_id = pool["Id"]
                  if pool_id == current_pool_id:
                      print(f"Keeping active pool: {pool_id}")
                      continue
                  print(f"Deleting orphaned pool: {pool_id}")
                  try:
                      detail = cognito.describe_user_pool(UserPoolId=pool_id)["UserPool"]
                      domain = detail.get("Domain")
                      if domain:
                          cognito.delete_user_pool_domain(Domain=domain, UserPoolId=pool_id)
                          print(f"  Deleted domain: {domain}")
                  except ClientError as e:
                      print(f"  Warning during domain deletion: {e}")
                  try:
                      cognito.delete_user_pool(UserPoolId=pool_id)
                      print(f"  Pool deleted")
                  except ClientError as e:
                      print(f"  Warning during pool deletion: {e}")
          PYEOF

      - name: Delete orphaned auth domain and wait for propagation
        run: |
          python3 << 'PYEOF'
          import boto3
          import time
          from botocore.exceptions import ClientError

          cognito = boto3.client("cognito-idp")
          cf = boto3.client("cloudformation")
          domain = "${{ vars.AUTH_DOMAIN_NAME }}"

          # Get the pool ID currently tracked by the live CF stack (if any)
          current_pool_id = None
          try:
              outputs = cf.describe_stacks(StackName="firefly-cognito")["Stacks"][0].get("Outputs", [])
              for o in outputs:
                  if o["OutputKey"] == "UserPoolId":
                      current_pool_id = o["OutputValue"]
          except ClientError:
              pass

          # Only delete the domain if it is attached to a *different* (orphaned) pool.
          # If it is already on the current stack's pool, leave it — CF will manage it
          # and the Route 53 alias already points to the correct CloudFront distribution.
          try:
              resp = cognito.describe_user_pool_domain(Domain=domain)
              desc = resp.get("DomainDescription", {})
              pool_id = desc.get("UserPoolId")
              status = desc.get("Status")
              if not pool_id:
                  print(f"Domain {domain} not found or already unregistered — no action needed")
              elif pool_id == current_pool_id:
                  print(f"Domain {domain} is on current stack pool {pool_id} — skipping deletion")
              else:
                  print(f"Domain {domain} is on orphaned pool {pool_id} (status={status}) — deleting")
                  cognito.delete_user_pool_domain(Domain=domain, UserPoolId=pool_id)
                  print(f"Domain {domain} deleted from orphaned pool")

                  # Poll until the domain is fully gone
                  print(f"Waiting for domain {domain} to be fully deregistered...")
                  for attempt in range(20):
                      resp = cognito.describe_user_pool_domain(Domain=domain)
                      desc = resp.get("DomainDescription", {})
                      pool_id = desc.get("UserPoolId")
                      status = desc.get("Status", "")
                      if not pool_id and status not in ("DELETING", "ACTIVE", "CREATING"):
                          print(f"Domain {domain} is clear (attempt {attempt + 1})")
                          break
                      print(f"  Attempt {attempt + 1}: domain still present (pool={pool_id}, status={status}) — waiting 15s")
                      time.sleep(15)
                  else:
                      print(f"WARNING: domain {domain} did not clear after 5 minutes — proceeding anyway")
          except ClientError as e:
              print(f"Warning during domain cleanup: {e}")
          PYEOF

      - name: Diagnose existing Cognito domain
        continue-on-error: true
        run: |
          echo "=== Checking if auth domain is already registered ==="
          aws cognito-idp describe-user-pool-domain \
            --domain ${{ vars.AUTH_DOMAIN_NAME }} \
            --output table 2>/dev/null || echo "Domain not found"

          echo "=== ACM certificate details ==="
          aws acm describe-certificate \
            --certificate-arn ${{ steps.lookup-cert.outputs.cert_arn }} \
            --query "Certificate.{Status:Status,Domain:DomainName,SANs:SubjectAlternativeNames}" \
            --output table 2>/dev/null || echo "DescribeCertificate not permitted (check IAM)"

      - name: Ensure parent domain has A record for Cognito domain validation
        id: ensure-parent-dns
        run: |
          AUTH_DOMAIN="${{ vars.AUTH_DOMAIN_NAME }}"
          PARENT_DOMAIN="${AUTH_DOMAIN#*.}"
          echo "Checking for A record on parent domain: $PARENT_DOMAIN"

          EXISTING_COUNT=$(aws route53 list-resource-record-sets \
            --hosted-zone-id ${{ secrets.ROUTE_53_HOSTED_ZONE_ID }} \
            --query "length(ResourceRecordSets[?Name=='${PARENT_DOMAIN}.' && Type=='A'])" \
            --output text)

          if [ "$EXISTING_COUNT" = "0" ]; then
            echo "No A record found for $PARENT_DOMAIN — creating temporary one for Cognito validation"
            CHANGE_ID=$(aws route53 change-resource-record-sets \
              --hosted-zone-id ${{ secrets.ROUTE_53_HOSTED_ZONE_ID }} \
              --change-batch "{
                \"Changes\": [{
                  \"Action\": \"CREATE\",
                  \"ResourceRecordSet\": {
                    \"Name\": \"$PARENT_DOMAIN\",
                    \"Type\": \"A\",
                    \"TTL\": 60,
                    \"ResourceRecords\": [{\"Value\": \"1.2.3.4\"}]
                  }
                }]
              }" \
              --query "ChangeInfo.Id" \
              --output text)
            echo "Waiting for Route 53 change $CHANGE_ID to propagate..."
            aws route53 wait resource-record-sets-changed --id "$CHANGE_ID"
            echo "Route 53 propagation complete"
            echo "created_parent_a_record=true" >> $GITHUB_OUTPUT
          else
            echo "A record already exists for $PARENT_DOMAIN — no action needed"
            echo "created_parent_a_record=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Cognito
        id: deploy
        run: |
          aws cloudformation deploy \
            --role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }} \
            --template-file templates/cognito.yaml \
            --stack-name firefly-cognito \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AuthDomainName=${{ vars.AUTH_DOMAIN_NAME }} \
              CertificateArn=${{ steps.lookup-cert.outputs.cert_arn }} \
              GoogleClientId=${{ secrets.GOOGLE_CLIENT_ID }} \
              GoogleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              UiCallbackUrl=https://${{ vars.UI_DOMAIN_NAME }}/callback \
              UiLogoutUrl=https://${{ vars.UI_DOMAIN_NAME }}/login \
              PreSignUpLambdaArn=${{ steps.lookup-presignup.outputs.presignup_arn }}

      - name: Print stack events on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          aws cloudformation describe-stack-events \
            --stack-name firefly-cognito \
            --query "StackEvents[?ResourceStatus=='CREATE_FAILED' || ResourceStatus=='UPDATE_FAILED'].{Resource:LogicalResourceId,Status:ResourceStatus,Reason:ResourceStatusReason}" \
            --output table

      - name: Ensure auth domain exists on current pool
        run: |
          python3 << 'PYEOF'
          import boto3, sys, time
          from botocore.exceptions import ClientError

          cognito = boto3.client("cognito-idp")
          cf = boto3.client("cloudformation")
          domain = "${{ vars.AUTH_DOMAIN_NAME }}"
          cert_arn = "${{ steps.lookup-cert.outputs.cert_arn }}"

          # Get the pool ID from the live stack
          pool_id = None
          try:
              outputs = cf.describe_stacks(StackName="firefly-cognito")["Stacks"][0].get("Outputs", [])
              for o in outputs:
                  if o["OutputKey"] == "UserPoolId":
                      pool_id = o["OutputValue"]
          except ClientError:
              pass

          if not pool_id:
              print("No active firefly-cognito stack found — skipping domain check")
              sys.exit(0)

          resp = cognito.describe_user_pool_domain(Domain=domain)
          desc = resp.get("DomainDescription", {})
          existing_pool = desc.get("UserPoolId")
          cf_dist = desc.get("CloudFrontDistribution", "")
          status = desc.get("Status", "")

          if existing_pool == pool_id and cf_dist and cf_dist != "None":
              print(f"Domain {domain} exists on current pool (status={status}, cf={cf_dist}) — no action needed")
              sys.exit(0)

          if existing_pool == pool_id and (not cf_dist or cf_dist == "None"):
              print(f"Domain {domain} is registered but CloudFront distribution is not yet provisioned (status={status}) — waiting...")
          else:
              print(f"Domain {domain} is missing from pool {pool_id} — creating")
              try:
                  cognito.create_user_pool_domain(
                      Domain=domain,
                      UserPoolId=pool_id,
                      CustomDomainConfig={"CertificateArn": cert_arn},
                  )
                  print(f"Domain {domain} created — waiting for CloudFront distribution to provision")
              except ClientError as e:
                  print(f"Failed to create domain: {e}")
                  sys.exit(1)

          # Wait up to 30 minutes for the CloudFront distribution to become active
          for attempt in range(60):
              resp = cognito.describe_user_pool_domain(Domain=domain)
              desc = resp.get("DomainDescription", {})
              cf_dist = desc.get("CloudFrontDistribution", "")
              status = desc.get("Status", "")
              if cf_dist and cf_dist != "None" and status == "ACTIVE":
                  print(f"Domain provisioned after {attempt + 1} attempts: {cf_dist}")
                  sys.exit(0)
              print(f"  Attempt {attempt + 1}/60: status={status}, cf={cf_dist} — waiting 30s")
              time.sleep(30)

          print("ERROR: Domain did not provision after 30 minutes")
          sys.exit(1)
          PYEOF

      - name: Create Route 53 alias for Cognito custom domain
        run: |
          CF_DOMAIN=$(aws cognito-idp describe-user-pool-domain \
            --domain ${{ vars.AUTH_DOMAIN_NAME }} \
            --query 'DomainDescription.CloudFrontDistribution' \
            --output text)

          if [ -z "$CF_DOMAIN" ] || [ "$CF_DOMAIN" = "None" ]; then
            echo "ERROR: CloudFront distribution for Cognito domain '${{ vars.AUTH_DOMAIN_NAME }}' is not yet available."
            echo "The Cognito custom domain may still be provisioning. Re-run this workflow once the domain is active."
            exit 1
          fi

          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ secrets.ROUTE_53_HOSTED_ZONE_ID }} \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${{ vars.AUTH_DOMAIN_NAME }}\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                    \"DNSName\": \"$CF_DOMAIN\",
                    \"EvaluateTargetHealth\": false
                  }
                }
              }]
            }"

      - name: Remove temporary parent domain A record
        if: always() && steps.ensure-parent-dns.outputs.created_parent_a_record == 'true'
        run: |
          AUTH_DOMAIN="${{ vars.AUTH_DOMAIN_NAME }}"
          PARENT_DOMAIN="${AUTH_DOMAIN#*.}"
          echo "Removing temporary A record for $PARENT_DOMAIN"
          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ secrets.ROUTE_53_HOSTED_ZONE_ID }} \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"DELETE\",
                \"ResourceRecordSet\": {
                  \"Name\": \"$PARENT_DOMAIN\",
                  \"Type\": \"A\",
                  \"TTL\": 60,
                  \"ResourceRecords\": [{\"Value\": \"1.2.3.4\"}]
                }
              }]
            }"
          echo "Temporary A record removed"
