name: 🚀 Deploy cognito
on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  deploy-cognito:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Look up ACM certificate ARN
        id: lookup-cert
        run: |
          CERT_ARN=$(aws acm list-certificates \
            --region us-east-1 \
            --certificate-statuses ISSUED \
            --query "CertificateSummaryList[?DomainName=='${{ vars.CERTIFICATE_DOMAIN_NAME }}'].CertificateArn" \
            --output text)
          echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT

      - name: Look up pre-signup Lambda ARN
        id: lookup-presignup
        run: |
          ARN=$(aws cloudformation describe-stacks \
            --stack-name firefly-func-cognito-pre-signup \
            --query "Stacks[0].Outputs[?OutputKey=='FuncCognitoPreSignupArn'].OutputValue" \
            --output text)
          echo "presignup_arn=$ARN" >> $GITHUB_OUTPUT

      - name: Delete stack if in ROLLBACK_COMPLETE
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name firefly-cognito \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE — deleting before redeploy"
            aws cloudformation delete-stack --stack-name firefly-cognito
            aws cloudformation wait stack-delete-complete --stack-name firefly-cognito
          fi

      - name: Deploy cognito
        id: deploy
        run: |
          aws cloudformation deploy \
            --role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }} \
            --template-file templates/cognito.yaml \
            --stack-name firefly-cognito \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AuthDomainName=${{ vars.AUTH_DOMAIN_NAME }} \
              CertificateArn=${{ steps.lookup-cert.outputs.cert_arn }} \
              GoogleClientId=${{ secrets.GOOGLE_CLIENT_ID }} \
              GoogleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              UiCallbackUrl=https://${{ vars.UI_DOMAIN_NAME }}/callback \
              UiLogoutUrl=https://${{ vars.UI_DOMAIN_NAME }}/login \
              PreSignUpLambdaArn=${{ steps.lookup-presignup.outputs.presignup_arn }}

      - name: Print stack events on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          aws cloudformation describe-stack-events \
            --stack-name firefly-cognito \
            --query "StackEvents[?ResourceStatus=='CREATE_FAILED' || ResourceStatus=='UPDATE_FAILED'].{Resource:LogicalResourceId,Status:ResourceStatus,Reason:ResourceStatusReason}" \
            --output table

      - name: Create Route 53 alias for Cognito custom domain
        run: |
          CF_DOMAIN=$(aws cognito-idp describe-user-pool-domain \
            --domain ${{ vars.AUTH_DOMAIN_NAME }} \
            --query 'DomainDescription.CloudFrontDistribution' \
            --output text)

          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ secrets.HOSTED_ZONE_ID }} \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${{ vars.AUTH_DOMAIN_NAME }}\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                    \"DNSName\": \"$CF_DOMAIN\",
                    \"EvaluateTargetHealth\": false
                  }
                }
              }]
            }"
