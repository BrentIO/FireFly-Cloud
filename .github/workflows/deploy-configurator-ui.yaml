name: 🚀 Deploy Configurator UI

on:
  repository_dispatch:
    types: [deploy-configurator-ui]
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select destination environment"
        options:
          - dev
          - production
      ref:
        type: string
        description: "FireFly-Controller branch or tag to deploy (default: main)"
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    environment: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target_env || inputs.target_env }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout FireFly-Controller
        uses: actions/checkout@v6
        with:
          repository: BrentIO/FireFly-Controller
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ref || inputs.ref || '' }}

      - name: Set build variables
        run: |
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: Controller/ui
        run: npm ci --legacy-peer-deps

      - name: Build UI
        working-directory: Controller/ui
        env:
          VITE_UI_VERSION: "${{ env.BRANCH }} (${{ env.COMMIT_HASH }})"
          VITE_CLOUD_MODE: "true"
        run: npm run build -- --outDir dist

      - name: Look up S3 bucket name
        id: lookup-s3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name firefly-configurator-s3 \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Sync to S3
        run: aws s3 sync Controller/ui/dist/ s3://${{ steps.lookup-s3.outputs.bucket }} --delete

      - name: Look up CloudFront distribution ID
        id: lookup-dist
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-configurator-cloudfront \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.lookup-dist.outputs.dist_id }} \
            --paths "/*"
