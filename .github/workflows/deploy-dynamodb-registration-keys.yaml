name: 🚀 Deploy dynamodb-registration-keys
on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  deploy-dynamodb-registration-keys:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy dynamodb-registration-keys
        env:
          ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }}
        run: |
          python3 << 'PYEOF'
          import boto3, json, os, subprocess, sys, time
          from botocore.exceptions import ClientError

          STACK    = 'firefly-dynamodb-registration-keys'
          TABLE    = 'firefly-registration-keys'
          ROLE     = os.environ['ROLE_ARN']
          TEMPLATE = 'templates/dynamodb-registration-keys.yaml'

          cf  = boto3.client('cloudformation')
          ddb = boto3.client('dynamodb')

          try:
            resp = cf.describe_stacks(StackName=STACK)
            stack_exists = resp['Stacks'][0]['StackStatus'] != 'DELETE_COMPLETE'
          except ClientError as e:
            stack_exists = False
            if 'does not exist' not in str(e):
              raise

          if stack_exists:
            print(f'Stack {STACK} exists — running normal deploy')
            r = subprocess.run([
              'aws', 'cloudformation', 'deploy',
              '--role-arn', ROLE,
              '--template-file', TEMPLATE,
              '--stack-name', STACK,
              '--no-fail-on-empty-changeset',
            ])
            sys.exit(r.returncode)

          try:
            ddb.describe_table(TableName=TABLE)
            table_exists = True
          except ClientError as e:
            table_exists = False
            if e.response['Error']['Code'] != 'ResourceNotFoundException':
              raise

          if not table_exists:
            print(f'Table {TABLE} does not exist — creating stack normally')
            r = subprocess.run([
              'aws', 'cloudformation', 'deploy',
              '--role-arn', ROLE,
              '--template-file', TEMPLATE,
              '--stack-name', STACK,
              '--no-fail-on-empty-changeset',
            ])
            sys.exit(r.returncode)

          print(f'Table {TABLE} exists but stack {STACK} does not — importing')

          with open(TEMPLATE) as f:
            template_text = f.read()

          import_template_body = template_text.split('\nOutputs:')[0]

          CS_NAME = 'import-registration-keys-table'

          cf.create_change_set(
            StackName=STACK,
            ChangeSetName=CS_NAME,
            ChangeSetType='IMPORT',
            RoleARN=ROLE,
            TemplateBody=import_template_body,
            ResourcesToImport=[{
              'ResourceType': 'AWS::DynamoDB::Table',
              'LogicalResourceId': 'RegistrationKeysTable',
              'ResourceIdentifier': {'TableName': TABLE},
            }],
          )

          print('Waiting for changeset to be ready...')
          while True:
            resp   = cf.describe_change_set(StackName=STACK, ChangeSetName=CS_NAME)
            status = resp['Status']
            if status == 'CREATE_COMPLETE':
              break
            if status in ('FAILED', 'DELETE_COMPLETE'):
              print(f'Changeset failed: {resp.get("StatusReason")}')
              cf.delete_change_set(StackName=STACK, ChangeSetName=CS_NAME)
              sys.exit(1)
            time.sleep(3)

          print('Executing changeset...')
          cf.execute_change_set(StackName=STACK, ChangeSetName=CS_NAME)

          print('Waiting for import to complete...')
          while True:
            resp   = cf.describe_stacks(StackName=STACK)
            status = resp['Stacks'][0]['StackStatus']
            if status == 'IMPORT_COMPLETE':
              print('Import complete')
              break
            if 'FAILED' in status or 'ROLLBACK' in status:
              print(f'Import failed with status: {status}')
              sys.exit(1)
            time.sleep(5)

          print('Running normal deploy to add Outputs...')
          r = subprocess.run([
            'aws', 'cloudformation', 'deploy',
            '--role-arn', ROLE,
            '--template-file', TEMPLATE,
            '--stack-name', STACK,
            '--no-fail-on-empty-changeset',
          ])
          sys.exit(r.returncode)
          PYEOF
