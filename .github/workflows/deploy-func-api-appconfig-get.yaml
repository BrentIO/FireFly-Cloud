name: 🚀 Deploy func-api-appconfig-get
on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  deploy-func-api-appconfig-get:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Look up API Gateway ID
        id: lookup-api
        run: |
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-api-gateway \
            --query "Stacks[0].Outputs[?OutputKey=='ApiId'].OutputValue" \
            --output text)
          echo "api_id=$API_ID" >> $GITHUB_OUTPUT

      - name: Look up Authorizer ID
        id: lookup-auth
        run: |
          AUTH_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-api-gateway \
            --query "Stacks[0].Outputs[?OutputKey=='AuthorizerId'].OutputValue" \
            --output text)
          echo "authorizer_id=$AUTH_ID" >> $GITHUB_OUTPUT

      - name: Deploy func-api-appconfig-get
        run: |
          sam deploy \
            --role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }} \
            --template-file lambdas/func-api-appconfig-get/template.yaml \
            --stack-name firefly-func-api-appconfig-get \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ secrets.AWS_REGION }} \
            --parameter-overrides \
              ApiId=${{ steps.lookup-api.outputs.api_id }} \
              AuthorizerId=${{ steps.lookup-auth.outputs.authorizer_id }} \
              EnvironmentName=${{ inputs.target_env }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket ${{ secrets.SAM_DEPLOYMENT_BUCKET_NAME }}
