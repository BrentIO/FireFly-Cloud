name: 🚀 Deploy S3 Firmware
on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
      run_tests:
        type: boolean
        description: "Run integration tests after deploy"
        default: true
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      run_tests:
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-s3-firmware:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        if: ${{ !env.ACT }}
        run: pip install aws-sam-cli

      - name: Look up UI domain
        id: lookup_ui
        run: |
          UI_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name firefly-cloudfront-ui \
            --query "Stacks[0].Outputs[?OutputKey=='UiDomain'].OutputValue" \
            --output text)

          echo "ui_domain=$UI_DOMAIN" >> $GITHUB_OUTPUT

      - name: Look up Lambda ARN for func-s3-firmware-uploaded
        id: lookup_uploaded
        run: |
          UPLOAD_ARN=$(aws lambda get-function \
            --function-name firefly-func-s3-firmware-uploaded \
            --query 'Configuration.FunctionArn' \
            --output text)

          echo "upload_arn=$UPLOAD_ARN" >> $GITHUB_OUTPUT

      - name: Look up Lambda ARN for func-s3-firmware-deleted
        id: lookup_deleted
        run: |
          DELETE_ARN=$(aws lambda get-function \
            --function-name firefly-func-s3-firmware-deleted \
            --query 'Configuration.FunctionArn' \
            --output text)

          echo "delete_arn=$DELETE_ARN" >> $GITHUB_OUTPUT

      - name: Build s3-firmware
        run: sam build --template-file templates/s3-firmware.yaml

      - name: Deploy s3-firmware
        run: |
          sam deploy \
            --role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.CLOUD_FORMATION_EXECUTION_ROLE_NAME }} \
            --template-file templates/s3-firmware.yaml \
            --stack-name firefly-s3-firmware \
            --region ${{ secrets.AWS_REGION }} \
            --parameter-overrides \
              BucketName=${{ secrets.S3_FIRMWARE_PRIVATE_BUCKET_NAME }} \
              UiDomain=${{ steps.lookup_ui.outputs.ui_domain }} \
              FirmwareUploadLambdaArn=${{ steps.lookup_uploaded.outputs.upload_arn }} \
              FirmwareDeleteLambdaArn=${{ steps.lookup_deleted.outputs.delete_arn }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket ${{ secrets.S3_SAM_DEPLOYMENT_BUCKET_NAME }}

  run-integration-tests:
    if: inputs.run_tests
    needs: deploy-s3-firmware
    uses: ./.github/workflows/run-integration-tests.yaml
    secrets: inherit
    with:
      target_env: ${{ inputs.target_env }}
