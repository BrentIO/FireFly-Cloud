name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (YYYY.MM.DD)"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "❌ Invalid version format: ${{ inputs.version }}. Expected YYYY.MM.DD"
            exit 1
          fi
          echo "✅ Version format is valid: ${{ inputs.version }}"

      - name: Tag and push
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true

  deploy:
    needs: release
    uses: ./.github/workflows/deploy-all.yaml
    secrets: inherit
    with:
      target_env: production
