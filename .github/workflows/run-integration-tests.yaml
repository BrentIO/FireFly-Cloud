name: 🧪 Run Integration Tests

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string

jobs:
  run-integration-tests:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Look up API URL
        id: lookup-api
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name firefly-api-gateway \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Look up UI URL
        id: lookup-ui
        run: |
          UI_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name firefly-cloudfront-ui \
            --query "Stacks[0].Outputs[?OutputKey=='UiDomain'].OutputValue" \
            --output text 2>/dev/null || echo "")

          if [ -n "$UI_DOMAIN" ]; then
            echo "ui_url=https://$UI_DOMAIN" >> $GITHUB_OUTPUT
          fi

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          FIREFLY_API_URL: ${{ steps.lookup-api.outputs.api_url }}
          FIREFLY_FIRMWARE_BUCKET: ${{ secrets.S3_FIRMWARE_BUCKET_NAME }}
          FIREFLY_UI_URL: ${{ steps.lookup-ui.outputs.ui_url }}
          FIREFLY_UI_BUCKET: ${{ secrets.S3_UI_BUCKET_NAME }}
