name: 🧪 Run Integration Tests

on:
  workflow_dispatch:
    inputs:
      target_env:
        type: choice
        description: "Select environment"
        options:
          - dev
          - production
      test_filter:
        type: string
        description: "pytest marker expression to filter tests (leave blank to run all)"
        required: false
        default: ""
  workflow_call:
    inputs:
      target_env:
        required: true
        type: string
      test_filter:
        required: false
        type: string
        default: ""

jobs:
  run-integration-tests:
    environment: ${{ inputs.target_env }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Look up API URL
        id: lookup-api
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name firefly-api-gateway \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Look up UI URL
        id: lookup-ui
        run: |
          UI_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name firefly-cloudfront-ui \
            --query "Stacks[0].Outputs[?OutputKey=='UiDomain'].OutputValue" \
            --output text 2>/dev/null || echo "")

          if [ -n "$UI_DOMAIN" ]; then
            echo "ui_url=https://$UI_DOMAIN" >> $GITHUB_OUTPUT
          fi

      - name: Look up Cognito User Pool ID and Client ID
        id: lookup-cognito
        run: |
          POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-cognito \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" \
            --output text 2>/dev/null || echo "")
          CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name firefly-cognito \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" \
            --output text 2>/dev/null || echo "")
          echo "user_pool_id=$POOL_ID" >> $GITHUB_OUTPUT
          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Generate transient CI credentials
        id: ci-creds
        if: steps.lookup-cognito.outputs.user_pool_id != ''
        run: |
          # Random email — unique per run, no secret needed
          EMAIL="ci-test-$(openssl rand -hex 8)@test.firefly.local"
          # Random password that satisfies Cognito's default policy
          # (8+ chars, uppercase, lowercase, digit, special)
          RAND=$(openssl rand -base64 18 | tr -d '=+/' | head -c 14)
          PASSWORD="Ci${RAND}1!"
          # Mask the password so it never appears in logs
          echo "::add-mask::$PASSWORD"
          echo "email=${EMAIL}" >> $GITHUB_OUTPUT
          echo "password=${PASSWORD}" >> $GITHUB_OUTPUT

      - name: Create CI test user
        if: steps.lookup-cognito.outputs.user_pool_id != ''
        run: |
          python3 << 'PYEOF'
          import boto3, os, sys

          pool_id = "${{ steps.lookup-cognito.outputs.user_pool_id }}"
          email    = "${{ steps.ci-creds.outputs.email }}"
          password = "${{ steps.ci-creds.outputs.password }}"

          cognito = boto3.client("cognito-idp")
          cognito.admin_create_user(
              UserPoolId=pool_id,
              Username=email,
              MessageAction="SUPPRESS",
          )
          print(f"Created CI test user: {email}")

          cognito.admin_set_user_password(
              UserPoolId=pool_id,
              Username=email,
              Password=password,
              Permanent=True,
          )
          print(f"Password set for: {email}")
          PYEOF

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run integration tests
        id: run-tests
        run: |
          if [ -n "${{ inputs.test_filter }}" ]; then
            pytest tests/integration/ -v -m "${{ inputs.test_filter }}"
          else
            pytest tests/integration/ -v
          fi
        env:
          FIREFLY_API_URL: ${{ steps.lookup-api.outputs.api_url }}
          FIREFLY_FIRMWARE_BUCKET: ${{ secrets.S3_FIRMWARE_PRIVATE_BUCKET_NAME }}
          FIREFLY_UI_URL: ${{ steps.lookup-ui.outputs.ui_url }}
          FIREFLY_UI_BUCKET: ${{ secrets.S3_UI_BUCKET_NAME }}
          FIREFLY_COGNITO_USER_POOL_ID: ${{ steps.lookup-cognito.outputs.user_pool_id }}
          FIREFLY_COGNITO_CLIENT_ID: ${{ steps.lookup-cognito.outputs.client_id }}
          FIREFLY_TEST_USER_EMAIL: ${{ steps.ci-creds.outputs.email }}
          FIREFLY_TEST_USER_PASSWORD: ${{ steps.ci-creds.outputs.password }}
          FIREFLY_DYNAMODB_USERS_TABLE_NAME: firefly-users

      - name: Delete CI test user
        if: always() && steps.lookup-cognito.outputs.user_pool_id != '' && steps.ci-creds.outputs.email != ''
        run: |
          python3 << 'PYEOF'
          import boto3
          from botocore.exceptions import ClientError

          pool_id = "${{ steps.lookup-cognito.outputs.user_pool_id }}"
          email   = "${{ steps.ci-creds.outputs.email }}"

          cognito = boto3.client("cognito-idp")
          try:
              cognito.admin_delete_user(UserPoolId=pool_id, Username=email)
              print(f"Deleted CI test user: {email}")
          except ClientError as e:
              if e.response["Error"]["Code"] == "UserNotFoundException":
                  print(f"CI test user not found, nothing to delete: {email}")
              else:
                  raise
          PYEOF
