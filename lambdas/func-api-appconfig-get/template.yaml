AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API GET /appconfig

Parameters:

  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

  AuthorizerId:
    Type: String
    Description: ID of the Cognito JWT authorizer on the HTTP API

  EnvironmentName:
    Type: String

Resources:

  FuncApiAppConfigGetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-appconfig-get-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AppConfigGetPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - appconfig:ListApplications
                  - appconfig:ListEnvironments
                  - appconfig:ListConfigurationProfiles
                  - appconfig:ListHostedConfigurationVersions
                  - appconfig:GetHostedConfigurationVersion
                  - appconfig:ListDeployments
                  - lambda:ListFunctions
                Resource: "*"

  FuncApiAppConfigGet:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-appconfig-get
      Role: !GetAtt FuncApiAppConfigGetRole.Arn
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          ENVIRONMENT_NAME: !Ref EnvironmentName

  FuncApiAppConfigGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiAppConfigGet.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiAppConfigGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /appconfig
      AuthorizationType: JWT
      AuthorizerId: !Ref AuthorizerId
      Target: !Sub integrations/${FuncApiAppConfigGetIntegration.IntegrationId}

  FuncApiAppConfigGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiAppConfigGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/appconfig

Outputs:
  FuncApiAppConfigGetArn:
    Value: !GetAtt FuncApiAppConfigGet.Arn
    Description: ARN of the appconfig GET Lambda
