AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API GET /devices/{uuid}/backup

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)

  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

  BackupBucketName:
    Type: String
    Description: Name of the S3 bucket for device backups
    Default: ""

Resources:

  FuncApiDevicesBackupGetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-devices-backup-get-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DevicesBackupGetPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-devices
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${BackupBucketName}/*
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"

  FuncApiDevicesBackupGet:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-devices-backup-get
      Role: !GetAtt FuncApiDevicesBackupGetRole.Arn
      CodeUri: .
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_DEVICES_TABLE_NAME: firefly-devices
          S3_BACKUP_BUCKET_NAME: !Ref BackupBucketName
          APP_CONFIG_ENV: default

  FuncApiDevicesBackupGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiDevicesBackupGet.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiDevicesBackupGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /devices/{uuid}/backup
      AuthorizationType: NONE
      Target: !Sub integrations/${FuncApiDevicesBackupGetIntegration.IntegrationId}

  FuncApiDevicesBackupGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiDevicesBackupGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/devices/*/backup

  FuncApiDevicesBackupGetLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FuncApiDevicesBackupGet}
      RetentionInDays: 30

Outputs:
  FuncApiDevicesBackupGetArn:
    Value: !GetAtt FuncApiDevicesBackupGet.Arn
    Description: ARN of the devices backup GET Lambda
