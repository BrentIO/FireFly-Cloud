AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API POST /devices/register

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)

  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

Resources:

  FuncApiDevicesRegisterPostRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-devices-register-post-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DevicesRegisterPostPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-devices
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:DeleteItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-registration-keys
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"

  FuncApiDevicesRegisterPost:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-devices-register-post
      Role: !GetAtt FuncApiDevicesRegisterPostRole.Arn
      CodeUri: .
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_DEVICES_TABLE_NAME: firefly-devices
          DYNAMODB_REGISTRATION_KEYS_TABLE_NAME: firefly-registration-keys
          APP_CONFIG_ENV: default

  FuncApiDevicesRegisterPostIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiDevicesRegisterPost.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiDevicesRegisterPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: POST /devices/register
      AuthorizationType: NONE
      Target: !Sub integrations/${FuncApiDevicesRegisterPostIntegration.IntegrationId}

  FuncApiDevicesRegisterPostPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiDevicesRegisterPost
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/POST/devices/register


Outputs:
  FuncApiDevicesRegisterPostArn:
    Value: !GetAtt FuncApiDevicesRegisterPost.Arn
    Description: ARN of the devices register POST Lambda
