AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API GET /devices/{uuid}/registration

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)

  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

Resources:

  FuncApiDevicesRegistrationGetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-devices-registration-get-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DevicesRegistrationGetPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-devices
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"

  FuncApiDevicesRegistrationGet:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-devices-registration-get
      Role: !GetAtt FuncApiDevicesRegistrationGetRole.Arn
      CodeUri: .
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_DEVICES_TABLE_NAME: firefly-devices
          APP_CONFIG_ENV: default

  FuncApiDevicesRegistrationGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiDevicesRegistrationGet.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiDevicesRegistrationGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /devices/{uuid}/registration
      AuthorizationType: NONE
      Target: !Sub integrations/${FuncApiDevicesRegistrationGetIntegration.IntegrationId}

  FuncApiDevicesRegistrationGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiDevicesRegistrationGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/devices/*/registration


Outputs:
  FuncApiDevicesRegistrationGetArn:
    Value: !GetAtt FuncApiDevicesRegistrationGet.Arn
    Description: ARN of the devices registration GET Lambda
