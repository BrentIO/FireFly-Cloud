AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API GET /firmware/{zip_name}/download

Parameters:
  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

  DynamoDbFirmwareTableName:
    Type: String
    Description: Name of the DynamoDB firmware table

  S3FirmwarePrivateBucketName:
    Type: String
    Description: Name of the private S3 firmware bucket

  AuthorizerId:
    Type: String
    Description: ID of the Cognito JWT authorizer on the HTTP API

  EnvironmentName:
    Type: String

Resources:

  FuncApiFirmwareDownloadGetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-firmware-download-get-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FirmwareDownloadGetPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDbFirmwareTableName}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDbFirmwareTableName}/index/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${S3FirmwarePrivateBucketName}
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:HeadObject
                Resource:
                  - !Sub arn:aws:s3:::${S3FirmwarePrivateBucketName}/*

  FuncApiFirmwareDownloadGet:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-firmware-download-get
      Role: !GetAtt FuncApiFirmwareDownloadGetRole.Arn
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 10
      MemorySize: 128
      Layers:
        - !ImportValue firefly-shared-layer-arn
      Environment:
        Variables:
          DYNAMODB_FIRMWARE_TABLE_NAME: !Ref DynamoDbFirmwareTableName
          S3_FIRMWARE_PRIVATE_BUCKET_NAME: !Ref S3FirmwarePrivateBucketName
          APP_CONFIG_ENV: !Ref EnvironmentName

  FuncApiFirmwareDownloadGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiFirmwareDownloadGet.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiFirmwareDownloadGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /firmware/{zip_name}/download
      AuthorizationType: JWT
      AuthorizerId: !Ref AuthorizerId
      Target: !Sub integrations/${FuncApiFirmwareDownloadGetIntegration.IntegrationId}

  FuncApiFirmwareDownloadGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiFirmwareDownloadGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/firmware/*/download

Outputs:
  FuncApiFirmwareDownloadGetArn:
    Value: !GetAtt FuncApiFirmwareDownloadGet.Arn
    Description: ARN of the firmware download GET Lambda
