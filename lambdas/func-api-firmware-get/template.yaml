AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API GET /firmware and GET /firmware/{zip_name}

Parameters:
  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

  DynamoDbFirmwareTableName:
    Type: String
    Description: Name of the DynamoDB firmware table

  EnvironmentName:
    Type: String

  UiOrigin:
    Type: String
    Description: Full UI origin URL for CORS response headers (e.g., https://example.com)
    Default: ""

Resources:

  FuncApiFirmwareGetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-firmware-get-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FirmwareGetPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDbFirmwareTableName}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDbFirmwareTableName}/index/*

  FuncApiFirmwareGet:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-firmware-get
      Role: !GetAtt FuncApiFirmwareGetRole.Arn
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 10
      MemorySize: 128
      Layers:
        - !ImportValue firefly-shared-layer-arn
      Environment:
        Variables:
          DYNAMODB_FIRMWARE_TABLE_NAME: !Ref DynamoDbFirmwareTableName
          APP_CONFIG_ENV: !Ref EnvironmentName
          UI_ORIGIN: !Ref UiOrigin

  FuncApiFirmwareGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiFirmwareGet.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiFirmwareListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /firmware
      Target: !Sub integrations/${FuncApiFirmwareGetIntegration.IntegrationId}

  FuncApiFirmwareGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /firmware/{zip_name}
      Target: !Sub integrations/${FuncApiFirmwareGetIntegration.IntegrationId}

  FuncApiFirmwareListPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiFirmwareGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/firmware

  FuncApiFirmwareGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiFirmwareGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/firmware/*

Outputs:
  FuncApiFirmwareGetArn:
    Value: !GetAtt FuncApiFirmwareGet.Arn
    Description: ARN of the firmware GET Lambda
