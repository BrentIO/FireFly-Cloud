AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API GET /firmware and GET /firmware/{zip_name}

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)
  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

  AuthorizerId:
    Type: String
    Description: ID of the Cognito JWT authorizer on the HTTP API

  EnvironmentName:
    Type: String

Resources:

  FuncApiFirmwareGetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-firmware-get-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FirmwareGetPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-firmware
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-firmware/index/*
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"

  FuncApiFirmwareGet:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-firmware-get
      Role: !GetAtt FuncApiFirmwareGetRole.Arn
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 10
      MemorySize: 128
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Environment:
        Variables:
          DYNAMODB_FIRMWARE_TABLE_NAME: firefly-firmware
          APP_CONFIG_ENV: !Ref EnvironmentName

  FuncApiFirmwareGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiFirmwareGet.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiFirmwareListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /firmware
      AuthorizationType: JWT
      AuthorizerId: !Ref AuthorizerId
      Target: !Sub integrations/${FuncApiFirmwareGetIntegration.IntegrationId}

  FuncApiFirmwareGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /firmware/{zip_name}
      AuthorizationType: JWT
      AuthorizerId: !Ref AuthorizerId
      Target: !Sub integrations/${FuncApiFirmwareGetIntegration.IntegrationId}

  FuncApiFirmwareListPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiFirmwareGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/firmware

  FuncApiFirmwareGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiFirmwareGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/firmware/*

  FuncApiFirmwareGetLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FuncApiFirmwareGet}
      RetentionInDays: 30

Outputs:
  FuncApiFirmwareGetArn:
    Value: !GetAtt FuncApiFirmwareGet.Arn
    Description: ARN of the firmware GET Lambda
