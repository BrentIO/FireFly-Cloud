AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API PATCH /firmware/{zip_name}/status

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)
  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

  DynamoDbFirmwareTableName:
    Type: String
    Description: Name of the DynamoDB firmware table

  FirmwarePrivateBucketName:
    Type: String
    Description: Name of the private S3 bucket containing firmware ZIPs

  FirmwarePublicBucketName:
    Type: String
    Description: Name of the public S3 bucket for OTA firmware delivery

  AuthorizerId:
    Type: String
    Description: ID of the Cognito JWT authorizer on the HTTP API

  EnvironmentName:
    Type: String

Resources:

  FuncApiFirmwareStatusPatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-firmware-status-patch-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FirmwareStatusPatchPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDbFirmwareTableName}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDbFirmwareTableName}/index/*
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${FirmwarePrivateBucketName}/processed/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${FirmwarePublicBucketName}
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:CopyObject
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::${FirmwarePublicBucketName}/*
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"

  FuncApiFirmwareStatusPatch:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-firmware-status-patch
      Role: !GetAtt FuncApiFirmwareStatusPatchRole.Arn
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 60
      MemorySize: 256
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Environment:
        Variables:
          DYNAMODB_FIRMWARE_TABLE_NAME: !Ref DynamoDbFirmwareTableName
          S3_FIRMWARE_PRIVATE_BUCKET_NAME: !Ref FirmwarePrivateBucketName
          S3_FIRMWARE_PUBLIC_BUCKET_NAME: !Ref FirmwarePublicBucketName
          APP_CONFIG_ENV: !Ref EnvironmentName

  FuncApiFirmwareStatusPatchIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiFirmwareStatusPatch.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiFirmwareStatusPatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: PATCH /firmware/{zip_name}/status
      AuthorizationType: JWT
      AuthorizerId: !Ref AuthorizerId
      Target: !Sub integrations/${FuncApiFirmwareStatusPatchIntegration.IntegrationId}

  FuncApiFirmwareStatusPatchPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiFirmwareStatusPatch
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/PATCH/firmware/*/status

Outputs:
  FuncApiFirmwareStatusPatchArn:
    Value: !GetAtt FuncApiFirmwareStatusPatch.Arn
    Description: ARN of the firmware status PATCH Lambda
