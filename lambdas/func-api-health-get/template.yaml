AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API GET /health

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)
  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

Resources:

  FuncApiHealthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-health-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: HealthPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"

  FuncApiHealth:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-health
      Role: !GetAtt FuncApiHealthRole.Arn
      CodeUri: .
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Environment:
        Variables:
          APP_CONFIG_ENV: default
      Handler: app.health
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 5
      MemorySize: 128

  FuncApiHealthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiHealth.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiHealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /health
      Target: !Sub integrations/${FuncApiHealthIntegration.IntegrationId}

  FuncApiHealthPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiHealth
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/*/health

  FuncApiHealthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FuncApiHealth}
      RetentionInDays: 30

Outputs:
  FuncApiHealthArn:
    Value: !GetAtt FuncApiHealth.Arn
    Description: ARN of the health check Lambda