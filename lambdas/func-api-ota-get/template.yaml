AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API GET /ota/{product_id}/{application}

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)
  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

  CloudFrontDomain:
    Type: String
    Description: Domain name of the CloudFront distribution for firmware delivery (e.g., firmware.somewhere.com)

  FirmwareTypeMapSsmPath:
    Type: String
    Description: SSM parameter path containing a JSON object mapping application name to esp32FOTA firmware type (e.g., /firefly/dev/firmware_type_map)

Resources:

  FuncApiOtaGetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-ota-get-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OtaGetPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-firmware
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-firmware/index/*
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"

  FuncApiOtaGet:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-ota-get
      Role: !GetAtt FuncApiOtaGetRole.Arn
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 10
      MemorySize: 128
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Environment:
        Variables:
          DYNAMODB_FIRMWARE_TABLE_NAME: firefly-firmware
          CLOUDFRONT_DOMAIN: !Ref CloudFrontDomain
          FIRMWARE_TYPE_MAP: !Sub "{{resolve:ssm:${FirmwareTypeMapSsmPath}}}"
          APP_CONFIG_ENV: default

  FuncApiOtaGetIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiOtaGet.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiOtaGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: GET /ota/{product_id}/{application}
      Target: !Sub integrations/${FuncApiOtaGetIntegration.IntegrationId}

  FuncApiOtaGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiOtaGet
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/GET/ota/*/*

  FuncApiOtaGetLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FuncApiOtaGet}
      RetentionInDays: 30

Outputs:
  FuncApiOtaGetArn:
    Value: !GetAtt FuncApiOtaGet.Arn
    Description: ARN of the OTA GET Lambda
