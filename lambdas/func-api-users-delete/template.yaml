AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API DELETE /users/{email}

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)

  ApiId:
    Type: String
    Description: The ID of the existing HTTP API to attach routes to

  AuthorizerId:
    Type: String
    Description: ID of the Cognito JWT authorizer on the HTTP API

  CognitoUserPoolId:
    Type: String
    Description: ID of the Cognito User Pool

  DynamoDbUsersTableName:
    Type: String
    Description: Name of the DynamoDB users allowed-list table

  EnvironmentName:
    Type: String

Resources:

  FuncApiUsersDeleteRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-api-users-delete-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: UsersDeletePermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:ListUsersInGroup
                  - cognito-idp:AdminDeleteUser
                Resource:
                  - !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}
              - Effect: Allow
                Action:
                  - dynamodb:DeleteItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDbUsersTableName}

              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"
  FuncApiUsersDelete:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-api-users-delete
      Role: !GetAtt FuncApiUsersDeleteRole.Arn
      CodeUri: .
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 15
      MemorySize: 128
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          DYNAMODB_USERS_TABLE_NAME: !Ref DynamoDbUsersTableName
          APP_CONFIG_ENV: !Ref EnvironmentName

  FuncApiUsersDeleteIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiId
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncApiUsersDelete.Arn}/invocations
      PayloadFormatVersion: "2.0"

  FuncApiUsersDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiId
      RouteKey: DELETE /users/{email}
      AuthorizationType: JWT
      AuthorizerId: !Ref AuthorizerId
      Target: !Sub integrations/${FuncApiUsersDeleteIntegration.IntegrationId}

  FuncApiUsersDeletePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FuncApiUsersDelete
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/DELETE/users/*

  FuncApiUsersDeleteLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FuncApiUsersDelete}
      RetentionInDays: 30

Outputs:
  FuncApiUsersDeleteArn:
    Value: !GetAtt FuncApiUsersDelete.Arn
    Description: ARN of the users DELETE Lambda
