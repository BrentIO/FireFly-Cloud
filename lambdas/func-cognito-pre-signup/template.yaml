AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Cognito pre-signup Lambda trigger — enforces allowed-list access control

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)

Resources:

  FuncCognitoPreSignupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-cognito-pre-signup-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PreSignupPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/firefly-users

              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"
  FuncCognitoPreSignup:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-cognito-pre-signup
      Role: !GetAtt FuncCognitoPreSignupRole.Arn
      CodeUri: .
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 5
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_USERS_TABLE_NAME: firefly-users
          APP_CONFIG_ENV: default


Outputs:

  FuncCognitoPreSignupArn:
    Description: ARN of the pre-signup Lambda (referenced by Cognito User Pool)
    Value: !GetAtt FuncCognitoPreSignup.Arn
    Export:
      Name: firefly-func-cognito-pre-signup-arn
