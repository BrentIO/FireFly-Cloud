AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Handles uploads of firmware ZIPs and writes manifest data to DynamoDB

Parameters:
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda layer
  AppConfigExtensionLayerArn:
    Type: String
    Description: ARN of the AWS AppConfig Lambda extension layer (arm64)
  FirmwareBucketName:
    Type: String
    Description: Name of the S3 bucket containing firmware ZIPs

  DynamoDbFirmwareTableName:
    Type: String
    Description: Name of the DynamoDB firmware table

  EnvironmentName:
    Type: String

Resources:

  FuncS3FirmwareUploadedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: firefly-func-s3-firmware-uploaded-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FirmwareUploadedPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # S3 access for incoming/processing/processed/errors
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${FirmwareBucketName}
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:HeadObject
                Resource:
                  - !Sub arn:aws:s3:::${FirmwareBucketName}/*

              # DynamoDB write access to the unified firmware table
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDbFirmwareTableName}
              - Effect: Allow
                Action:
                  - appconfig:StartConfigurationSession
                  - appconfig:GetLatestConfiguration
                Resource: "*"

  FuncS3FirmwareUploaded:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: firefly-func-s3-firmware-uploaded
      Role: !GetAtt FuncS3FirmwareUploadedRole.Arn
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 30
      MemorySize: 128
      Layers:
        - !Ref SharedLayerArn
        - !Ref AppConfigExtensionLayerArn
      Environment:
        Variables:
          DYNAMODB_FIRMWARE_TABLE_NAME: !Ref DynamoDbFirmwareTableName
          APP_CONFIG_ENV: !Ref EnvironmentName

  FuncS3FirmwareUploadedLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FuncS3FirmwareUploaded}
      RetentionInDays: 40

Outputs:
  FuncS3FirmwareUploadedArn:
    Description: ARN of the firmware upload processor Lambda
    Value: !GetAtt FuncS3FirmwareUploaded.Arn
