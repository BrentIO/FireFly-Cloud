AWSTemplateFormatVersion: '2010-09-09'
Description: ACM certificate for FireFly Cognito custom auth domain (must be in us-east-1)

Parameters:
  CertificateDomainName:
    Type: String
    Description: Domain name for the ACM certificate (e.g., *.p5software.com)

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID

Resources:
  CognitoCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref CertificateDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref CertificateDomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: firefly-cognito-certificate

Outputs:
  CertificateArn:
    Value: !Ref CognitoCertificate
    Description: ARN of the ACM certificate for Cognito custom domain
