AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront distribution for the FireFly Configurator UI static site

Parameters:
  ConfiguratorBucketName:
    Type: String
    Description: Name of the private S3 bucket containing the configurator static files

  CertificateArn:
    Type: String
    Description: ARN of the ACM certificate for the configurator domain (must be in us-east-1)

  ConfiguratorDomain:
    Type: String
    Description: Custom domain name for the configurator (e.g., configurator.fireflylx.com)

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for the configurator domain

Resources:

  ConfiguratorOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: firefly-configurator-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ConfiguratorDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref ConfiguratorDomain
        Origins:
          - Id: ConfiguratorS3Origin
            DomainName: !Sub "${ConfiguratorBucketName}.s3.${AWS::Region}.amazonaws.com"
            OriginAccessControlId: !GetAtt ConfiguratorOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          TargetOriginId: ConfiguratorS3Origin
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          DefaultTTL: 0
          MaxTTL: 0
          MinTTL: 0
          Compress: true
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        HttpVersion: http2
        PriceClass: PriceClass_100

  ConfiguratorBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ConfiguratorBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ConfiguratorBucketName}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${ConfiguratorDistribution}"

  ConfiguratorDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ConfiguratorDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt ConfiguratorDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  DistributionId:
    Value: !Ref ConfiguratorDistribution
    Description: CloudFront distribution ID

  DistributionDomain:
    Value: !GetAtt ConfiguratorDistribution.DomainName
    Description: CloudFront distribution domain name

  ConfiguratorDomain:
    Value: !Ref ConfiguratorDomain
    Description: Custom configurator domain name
