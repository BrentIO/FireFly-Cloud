AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront distribution for the FireFly Management Console (FMC) static site

Parameters:
  FmcBucketName:
    Type: String
    Description: Name of the private S3 bucket containing the FMC static files

  CertificateArn:
    Type: String
    Description: ARN of the ACM certificate for the FMC domain (must be in us-east-1)

  FmcDomain:
    Type: String
    Description: Custom domain name for the FMC (e.g., fmc.fireflylx.com)

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for the FMC domain

Resources:

  FmcOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: firefly-fmc-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FmcDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref FmcDomain
        Origins:
          - Id: FmcS3Origin
            DomainName: !Sub "${FmcBucketName}.s3.${AWS::Region}.amazonaws.com"
            OriginAccessControlId: !GetAtt FmcOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          TargetOriginId: FmcS3Origin
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          DefaultTTL: 0
          MaxTTL: 0
          MinTTL: 0
          Compress: true
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        HttpVersion: http2
        PriceClass: PriceClass_100

  FmcBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FmcBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FmcBucketName}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FmcDistribution}"

  FmcDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref FmcDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt FmcDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  DistributionId:
    Value: !Ref FmcDistribution
    Description: CloudFront distribution ID

  DistributionDomain:
    Value: !GetAtt FmcDistribution.DomainName
    Description: CloudFront distribution domain name

  FmcDomain:
    Value: !Ref FmcDomain
    Description: Custom FMC domain name
