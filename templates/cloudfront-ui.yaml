AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront distribution for the FireFly UI static site

Parameters:
  UiBucketName:
    Type: String
    Description: Name of the private S3 bucket containing the UI static files

  CertificateArn:
    Type: String
    Description: ARN of the ACM certificate for the UI domain (must be in us-east-1)

  UiDomain:
    Type: String
    Description: Custom domain name for the UI (e.g., ui.p5software.com)

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for the UI domain

Resources:

  UiOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: firefly-ui-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  UiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref UiDomain
        Origins:
          - Id: UiS3Origin
            DomainName: !Sub "${UiBucketName}.s3.${AWS::Region}.amazonaws.com"
            OriginAccessControlId: !GetAtt UiOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          TargetOriginId: UiS3Origin
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          DefaultTTL: 0
          MaxTTL: 0
          MinTTL: 0
          Compress: true
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        HttpVersion: http2
        PriceClass: PriceClass_100

  UiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UiBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${UiBucketName}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${UiDistribution}"

  UiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref UiDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt UiDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  DistributionId:
    Value: !Ref UiDistribution
    Description: CloudFront distribution ID

  DistributionDomain:
    Value: !GetAtt UiDistribution.DomainName
    Description: CloudFront distribution domain name

  UiDomain:
    Value: !Ref UiDomain
    Description: Custom UI domain name
