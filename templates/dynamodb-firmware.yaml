AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DynamoDB table for FireFly firmware manifests

Parameters:
  DynamoDbFirmwareTableName:
    Type: String
    Default: firefly-firmware

Resources:

  FireflyFirmwareTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDbFirmwareTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: version
          AttributeType: S
        - AttributeName: product_id
          AttributeType: S
        - AttributeName: zip_name
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: product_id-index
          KeySchema:
            - AttributeName: product_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: zip_name-index
          KeySchema:
            - AttributeName: zip_name
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      DeletionProtectionEnabled: true

Outputs:
  FireflyFirmwareTableName:
    Description: Name of the firmware table
    Value: !Ref FireflyFirmwareTable

  FireflyFirmwareTableArn:
    Description: ARN of the firmware table
    Value: !GetAtt FireflyFirmwareTable.Arn
