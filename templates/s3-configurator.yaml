AWSTemplateFormatVersion: '2010-09-09'
Description: Private S3 bucket for the FireFly Configurator UI static site

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to create for the configurator static files

Resources:

  ConfiguratorBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  BucketName:
    Value: !Ref ConfiguratorBucket
    Description: Name of the S3 bucket hosting the configurator static files
