AWSTemplateFormatVersion: '2010-09-09'
Description: Private S3 bucket for the FireFly UI static site

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to create for the UI static files

Resources:

  UiBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  BucketName:
    Value: !Ref UiBucket
    Description: Name of the S3 bucket hosting the UI static files
